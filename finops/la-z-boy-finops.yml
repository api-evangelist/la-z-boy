meters:
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - integration
      - environment
principles:
  - name: Visibility
    description: No public consumption telemetry; integrators must capture client-side request volumes
      themselves.
  - name: Allocation
    description: Tag any private API calls with the consuming program/business unit to enable internal
      chargeback against the partner agreement.
  - name: Optimization
    description: Cache catalog/dealer data; coordinate batch workflows to reduce request volume on shared
      partner endpoints.
  - name: Accountability
    description: Partnership owner reviews integration metrics against the partner agreement.
maintainers:
