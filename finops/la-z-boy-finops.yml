description: La-Z-Boy publishes no public API pricing or billing documentation. This artifact is a placeholder
  FOCUS-aligned scaffold for any future private partner integration; meters are illustrative.
sources:
  - https://www.la-z-boy.com/
notes: No public pricing or billing model. FinOps shape can only be filled in once a partner agreement
  exists.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: La-Z-Boy Incorporated
serviceCategory: Retail / Furniture
billingModel:
  pricingCategory: Contract / Partner
  billingFrequency: Per-Contract
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
focusColumns:
  ServiceName: La-Z-Boy
  ServiceCategory: Retail / Furniture
  ProviderName: La-Z-Boy
  PublisherName: La-Z-Boy Incorporated
  InvoiceIssuerName: La-Z-Boy Incorporated
